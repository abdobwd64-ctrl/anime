<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AnimeLek - احدث الانمي</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="header">
    <div class="container header-inner">
      <a href="index.html" class="logo"><span class="logo-icon">🍥</span>AnimeLek</a>
      <nav class="nav">
        <a href="index.html" class="active">الرئيسية</a>
        <a href="pages/all-anime.html">كل الأنميات</a>
      </nav>
      <div class="search-box">
        <span class="icon">🔍</span>
        <input type="text" placeholder="ابحث عن انمي..." id="searchInput" onkeydown="if(event.key==='Enter') searchAnime(this.value)">
      </div>
      <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">🌙</button>
    </div>
  </header>

  <section class="section" style="padding-top:120px">
    <div class="container">
      <div class="section-header">
        <h2 class="section-title">أحدث الحلقات <span class="badge">جديد</span></h2>
        <a href="pages/latest-all.html" class="view-all" id="latestMoreBtn">عرض الكل ←</a>
      </div>
      <p id="latestDate" style="font-size:.82rem;color:var(--text-muted);margin-bottom:16px;"></p>
      <div class="anime-grid" id="latestGrid"></div>
    </div>
  </section>

  <section class="section">
    <div class="container">
      <div class="section-header">
        <h2 class="section-title">🔥 أشهر الأنمي</h2>
      </div>
      <div class="anime-grid" id="popularGrid"></div>
    </div>
  </section>

  <footer class="footer">
    <div class="container"><p>AnimeLek © 2026</p></div>
  </footer>

  <script src="js/main.js"></script>
  <script>
    loadData();
  </script>
</body>
</html>
