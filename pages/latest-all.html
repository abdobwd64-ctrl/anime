<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>كل الحلقات - AnimeLek</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .pagination { display:flex; gap:6px; justify-content:center; flex-wrap:wrap; margin-top:32px; }
    .pagination button { padding:8px 14px; border-radius:8px; border:1px solid var(--border); background:var(--bg-card); color:var(--text); cursor:pointer; font-size:.85rem; transition:all var(--transition); }
    .pagination button:hover { background:var(--primary); color:#fff; border-color:var(--primary); }
    .pagination button.active { background:var(--primary); color:#fff; border-color:var(--primary); font-weight:700; }
    .pagination button:disabled { opacity:.4; cursor:default; }
  </style>
</head>
<body>
  <header class="header">
    <div class="container header-inner">
      <a href="../index.html" class="logo"><span class="logo-icon">🍥</span>AnimeLek</a>
      <nav class="nav">
        <a href="../index.html">الرئيسية</a>
        <a href="all-anime.html">كل الأنميات</a>
        <a href="all-anime.html">قائمة الأنمي</a>
        <a href="movies.html">أفلام الأنمي</a>
      </nav>
      <div class="search-box">
        <span class="icon">🔍</span>
        <input type="text" placeholder="ابحث عن انمي..." id="searchInput" onkeydown="if(event.key==='Enter') searchAnime(this.value)">
      </div>
      <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">🌙</button>
    </div>
  </header>

  <section class="section" style="padding-top:120px">
    <div class="container">
      <div class="section-header">
        <h2 class="section-title">📺 كل الحلقات</h2>
      </div>
      <p id="allLatestDate" style="font-size:.82rem;color:var(--text-muted);margin-bottom:16px;"></p>
      <div class="anime-grid" id="allLatestGrid"></div>
      <div class="pagination" id="pagination"></div>
    </div>
  </section>

  <footer class="footer">
    <div class="container"><p>AnimeLek © 2026</p></div>
  </footer>

  <script src="../js/main.js"></script>
  <script>
    loadAllLatest();
  </script>
</body>
</html>
